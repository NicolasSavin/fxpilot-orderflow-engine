name: CI
on:
  push:
  pull_request:
jobs:
  offline-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Compile
        run: python -m compileall app tests
      - name: Pytest
        env:
          FXPILOT_ORDERFLOW_PROVIDER: mock
        run: pytest -q
      - name: Ruff
        run: |
          if python -m ruff --version >/dev/null 2>&1; then python -m ruff check app tests; else echo 'ruff not configured'; fi
